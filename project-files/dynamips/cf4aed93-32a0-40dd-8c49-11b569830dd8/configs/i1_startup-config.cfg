!
hostname PE1

! ========================
! VRF (PE uniquement)
! ========================


ip vrf CLIENT_A
 rd 65000:1
 route-target export 65000:1
 route-target import 65000:1
!

ip vrf CLIENT_B
 rd 65000:2
 route-target export 65000:2
 route-target import 65000:2
!



! ========================
! LOOPBACK
! ========================
interface Loopback0
 ip address 15.15.15.15 255.255.255.255
!

! ========================
! INTERFACES
! ========================

interface FastEthernet0/0

 ip address 10.0.0.1 255.255.255.252
 no shutdown
!

interface GigabitEthernet1/0

 ip address 10.0.0.9 255.255.255.252
 no shutdown
!

interface GigabitEthernet2/0

 ip vrf forwarding CLIENT_A

 ip address 10.0.0.54 255.255.255.252
 no shutdown
!

interface GigabitEthernet3/0

 ip vrf forwarding CLIENT_B

 ip address 10.0.0.66 255.255.255.252
 no shutdown
!


! ========================
! OSPF
! ========================

router ospf 1
 router-id 15.15.15.15

 network 10.0.0.0 0.0.0.3 area 0

 network 10.0.0.8 0.0.0.3 area 0

 network 15.15.15.15 0.0.0.0 area 0

!


! ========================
! MPLS / LDP (P + PE)
! ========================

mpls label protocol ldp
mpls ldp router-id Loopback0 force

interface FastEthernet0/0
 mpls ip
!

interface GigabitEthernet1/0
 mpls ip
!



! ========================
! BGP (UNIQUE BLOC)
! ========================

router bgp 65000
 bgp log-neighbor-changes

! ---------- voisins PE-PE (MP-BGP)

 neighbor 16.16.16.16 remote-as 65000
 neighbor 16.16.16.16 update-source Loopback0
 neighbor 16.16.16.16 send-community extended


! ---------- voisins CE (global - rarement utilis� mais safe)


! ---------- MP-BGP vpnv4

 address-family vpnv4

  neighbor 16.16.16.16 activate

 exit-address-family


! ---------- VRF address-family (PE)


 address-family ipv4 vrf CLIENT_A

  neighbor 10.0.0.53 remote-as 65001
  neighbor 10.0.0.53 activate

  redistribute connected
 exit-address-family

 address-family ipv4 vrf CLIENT_B

  neighbor 10.0.0.65 remote-as 65004
  neighbor 10.0.0.65 activate

  redistribute connected
 exit-address-family



! ---------- CE : annonce automatique


!
