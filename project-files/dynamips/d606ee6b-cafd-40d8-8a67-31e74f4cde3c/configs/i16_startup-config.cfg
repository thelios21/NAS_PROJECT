!
hostname CE4

! ========================
! VRF (PE uniquement)
! ========================


! ========================
! LOOPBACK
! ========================
interface Loopback0
 ip address 192.168.4.1 255.255.255.255
!

! ========================
! INTERFACES
! ========================

interface FastEthernet0/0

 ip address 10.0.0.65 255.255.255.252
 no shutdown
!


! ========================
! OSPF
! ========================


! ========================
! MPLS / LDP (P + PE)
! ========================


! ========================
! BGP (UNIQUE BLOC)
! ========================

router bgp 65004
 bgp log-neighbor-changes

! ---------- voisins PE-PE (MP-BGP)


! ---------- voisins CE (global - rarement utilis� mais safe)

 neighbor 10.0.0.66 remote-as 65000
 neighbor 10.0.0.66 description PE1


! ---------- MP-BGP vpnv4


! ---------- VRF address-family (PE)


! ---------- CE : annonce automatique

 address-family ipv4

  network 192.168.4.1 mask 255.255.255.255

 exit-address-family


!
