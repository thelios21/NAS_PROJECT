!
hostname PE2

! ========================
! VRF (PE uniquement)
! ========================


ip vrf CLIENT_A
 rd 65000:1
 route-target export 65000:1
 route-target import 65000:1
!

ip vrf CLIENT_B
 rd 65000:2
 route-target export 65000:2
 route-target import 65000:2
!



! ========================
! LOOPBACK
! ========================
interface Loopback0
 ip address 16.16.16.16 255.255.255.255
!

! ========================
! INTERFACES
! ========================

interface FastEthernet0/0

 ip address 10.0.0.6 255.255.255.252
 no shutdown
!

interface GigabitEthernet1/0

 ip address 10.0.0.14 255.255.255.252
 no shutdown
!

interface GigabitEthernet2/0

 ip vrf forwarding CLIENT_A

 ip address 10.0.0.58 255.255.255.252
 no shutdown
!

interface GigabitEthernet3/0

 ip vrf forwarding CLIENT_B

 ip address 10.0.0.61 255.255.255.252
 no shutdown
!


! ========================
! OSPF
! ========================

router ospf 1
 router-id 16.16.16.16

 network 10.0.0.4 0.0.0.3 area 0

 network 10.0.0.12 0.0.0.3 area 0

 network 16.16.16.16 0.0.0.0 area 0

!


! ========================
! MPLS / LDP (P + PE)
! ========================

mpls label protocol ldp
mpls ldp router-id Loopback0 force

interface FastEthernet0/0
 mpls ip
!

interface GigabitEthernet1/0
 mpls ip
!



! ========================
! BGP (UNIQUE BLOC)
! ========================

router bgp 65000
 bgp log-neighbor-changes

! ---------- voisins PE-PE (MP-BGP)

 neighbor 15.15.15.15 remote-as 65000
 neighbor 15.15.15.15 update-source Loopback0
 neighbor 15.15.15.15 send-community extended


! ---------- voisins CE (global - rarement utilis� mais safe)


! ---------- MP-BGP vpnv4

 address-family vpnv4

  neighbor 15.15.15.15 activate

 exit-address-family


! ---------- VRF address-family (PE)


 address-family ipv4 vrf CLIENT_A

  neighbor 10.0.0.57 remote-as 65002
  neighbor 10.0.0.57 activate

  redistribute connected
 exit-address-family

 address-family ipv4 vrf CLIENT_B

  neighbor 10.0.0.62 remote-as 65003
  neighbor 10.0.0.62 activate

  redistribute connected
 exit-address-family



! ---------- CE : annonce automatique


!
